<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Conlang Navigator</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet"/>

<style>
body { margin:0; padding:0; }
#map { position:absolute; top:0; bottom:0; width:100%; }

#routeBtn {
  position:absolute;
  top:20px;
  left:20px;
  z-index:2;
  padding:12px;
  font-size:16px;
}

#instructions {
  position:absolute;
  bottom:0;
  width:100%;
  background:white;
  max-height:40%;
  overflow-y:auto;
  padding:10px;
  font-size:16px;
  z-index:2;
}
</style>
</head>

<body>

<button id="routeBtn">Start Route</button>
<div id="map"></div>
<div id="instructions"></div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoibGFuZ21hcCIsImEiOiJjbWxzaXRta3MwN21vM2ZzNzMyanA4bWEzIn0.lJcTqMBmQsgB5hl44ZZfGg';

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/streets-v12',
  center: [-122.4194, 37.7749], // default center
  zoom: 13
});

  map.on('load', () => {

  map.addSource('india-border', {
    type: 'geojson',
    data: 'india_border_indian_claim.geojson'
  });

  map.addLayer({
    id: 'india-border',
    type: 'line',
    source: 'india-border',
    paint: {
      'line-color': '#FF9933',
      'line-width': 3
    }
  });

});

const instructionBox = document.getElementById("instructions");

document.getElementById("routeBtn").onclick = async function() {

  navigator.geolocation.getCurrentPosition(async (position) => {

    const start = `${position.coords.longitude},${position.coords.latitude}`;
    const end = `${position.coords.longitude + 0.01},${position.coords.latitude + 0.01}`;

    if (window.startMarker) window.startMarker.remove();
    if (window.endMarker) window.endMarker.remove();

    // Parse coordinates
    const startCoords = start.split(",").map(Number);
    const endCoords = end.split(",").map(Number);

// Start marker
    window.startMarker = new mapboxgl.Marker({ color: "blue" })
   .setLngLat(startCoords)
   .addTo(map);

// End marker
   window.endMarker = new mapboxgl.Marker({ color: "red" })
   .setLngLat(endCoords)
   .addTo(map);





    const response = await fetch(
      `https://api.mapbox.com/directions/v5/mapbox/driving/${start};${end}?steps=true&geometries=geojson&access_token=${mapboxgl.accessToken}`
    );

    const data = await response.json();
console.log(data);

// SAFETY CHECK HERE
if (!data.routes || data.routes.length === 0) {
  alert("No route found.");
  return;
}

const route = data.routes[0];


// Create bounds
const bounds = new mapboxgl.LngLatBounds();

// Extend bounds with route coordinates
route.geometry.coordinates.forEach(coord => {
  bounds.extend(coord);
});

// Zoom map to fit route
map.fitBounds(bounds, { padding: 50 });


    // Remove old route if it exists
    if (map.getSource("route")) {
      map.removeLayer("route");
      map.removeSource("route");
    }

    // Draw route line
    map.addSource("route", {
      type: "geojson",
      data: {
        type: "Feature",
        geometry: route.geometry
      }
    });

    map.addLayer({
      id: "route",
      type: "line",
      source: "route",
      paint: {
        "line-color": "#007AFF",
        "line-width": 5
      }
    });

    // Clear previous instructions
    instructionBox.innerHTML = "";

    const steps = route.legs.flatMap(leg => leg.steps);
    const lastStepIndex = steps.length - 1;

    steps.forEach((step, index) => {

  const type = step.maneuver.type;
  const modifier = step.maneuver.modifier || "";
  let distance;

if (step.distance > 1000) {
  distance = (step.distance / 1000).toFixed(1) + " kilometers";
} else {
  distance = Math.round(step.distance) + " meters";
}

  let sentence = "";

  if (type === "depart") {
    sentence = "Depart";
  }

  else if (type === "arrive" && index === lastStepIndex) {
    sentence = "You have arrived";
  }

  else if (type === "turn") {
    if (modifier === "left") {
      sentence = `Turn left in ${distance}.`;
    } else if (modifier === "right") {
      sentence = `Turn right in ${distance}.`;
    } else {
      sentence = `Turn in ${distance} meters`;
    }
  }

  else if (type === "continue") {
    sentence = `Continue straight for ${distance}.`;
  }

  else {
    sentence = `Continue for ${distance}.`;
  }

  const p = document.createElement("p");
  p.textContent = sentence;
  instructionBox.appendChild(p);
});


  });
};
</script>

</body>
</html>
